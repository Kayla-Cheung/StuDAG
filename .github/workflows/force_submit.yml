name: Force Submit Parallax Issue

on:
  push:
    paths:
      - '.github/workflows/force_submit.yml'

jobs:
  force-submit:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: write
    steps:
      - uses: actions/checkout@v3
      - name: Combine and Create Issue
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Writing full issue body..."
          cat << 'EOF' > full_issue.md
          ## 1. 视差哲学 (The Parallax Philosophy)
          当前的 DAG 物理引擎呈现的是一个**单线程、扁平化**的知识解构路径（父节点 -> 子节点）。
          但在真实的深度认知（尤其对于 ADHD 发散性学习者）中，知识不是树状的，而是**全息的（Holographic）**。
          同一个概念，必须通过多视角的“视差（Parallax）”对齐，才能形成真正的物理理解。
          
          比如 `CPU`:
          - **Parallax 1 (Physics)**: 晶体管与半导体掺杂
          - **Parallax 2 (Architecture)**: 指令集与流水线
          - **Parallax 3 (Sociology/History)**: 仙童半导体与摩尔定律
          
          ## 2. 核心痛点
          目前大模型在 `push_node` 时，只能提供单调的 `topic`。如果它同时推入多个不同维度的视差，在现有的 2D 图谱上会显得混乱不堪，且无法体现“它们其实是同一个物体的不同侧面”这一空间关系。
          
          ## 3. 架构演进方案 (Proposed Architecture)
          
          ### 3.1 后端引擎层 (DAG Engine)
          需要扩展 `Node` 的物理模型，引入 `parallax_layer` 维度。
          ```python
          class Node(BaseModel):
              id: str
              topic: str
              parent_id: Optional[str]
              status: str = "pending"
              parallax_layer: str = "core"
          ```
          
          ### 3.2 大模型网关层 (MCP Membrane)
          强制大模型在压栈时，不仅要进行概念分解，还要**进行空间视差映射**。
          
          ### 3.3 前端物理渲染层 (Glassmorphism UI)
          *   **空间折叠**：在网页端引入 2.5D 或 3D 分层概念。
          *   **视差切换**：用户可以快捷键切换滤镜视角。
          
          ### 3.4 物理拦截网 (Physical Transaction Membrane) [Addendum]
          为了从根本上根除大模型在文本生成层面上产生的“幻觉谎言”（即 Uncommitted Transaction / 毒性谄媚现象），必须在 Parallax 网关层硬编码以下物理防御机制：
          
          1. **Token 剥夺与强类型约束 (Schema Enforcing)**
             彻底拦截并屏蔽大模型的自由文本输出（禁止其说“我已记录”）。强制必须且只能通过严格校验的 Pydantic JSON Schema 返回。
          
          2. **两段式提交 (Two-Phase Commit)**
             大模型发送的 `PushRequest` 仅被视为事务的预提交 (Prepare)。只有 Engine 完成磁盘落盘并返回 `<ACK_HASH>` 后，系统才注入“成功”信号。
          
          3. **IFC 物理脱节拦截器 (Information Flow Control)**
             如果大模型的上下文中出现了未经底层 API 确认的动作断言，Membrane 直接抛出 `PhysicalDisconnectError`。没收到 200 OK，绝对不允许输出一句确认。
          
          ## 4. 交付验收标准 (PoW)
          1. [ ] `core.py` 支持 Parallax Meta-data。
          2. [ ] `server.py` MCP 协议更新。
          3. [ ] `index.html` 支持视差过滤。
          EOF
          
          # 剥离所有可能导致报错的标签和 assignee，进行最纯粹的物理投递
          gh issue create --title "Architecture: Parallax Cognitive Dimensions (视差认知空间) + Anti-Hallucination Membrane" --body-file full_issue.md
      
      - name: Cleanup
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git rm .github/workflows/force_submit.yml
          git commit -m "chore: clean up forced issue submission workflow"
          git push

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StuDAG Visualizer</title>
    <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Inter', sans-serif; background: #0f172a; color: #f8fafc; overflow: hidden; }
        #network { width: 100%; height: 100vh; position: absolute; top: 0; left: 0; z-index: 1; }
        #controls { 
            position: absolute; top: 24px; left: 24px; z-index: 10; 
            background: rgba(30, 41, 59, 0.85); padding: 24px; border-radius: 16px; 
            border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(12px); 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            width: 320px;
        }
        h1 { margin: 0 0 8px 0; font-size: 1.25rem; font-weight: 600; letter-spacing: -0.025em; background: linear-gradient(135deg, #60a5fa, #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        p.subtitle { margin: 0 0 20px 0; font-size: 0.875rem; color: #94a3b8; }
        .control-group { margin-bottom: 20px; background: rgba(15, 23, 42, 0.5); padding: 16px; border-radius: 12px; border: 1px solid rgba(255, 255, 255, 0.05); }
        .control-group h2 { margin: 0 0 12px 0; font-size: 0.875rem; font-weight: 500; color: #cbd5e1; text-transform: uppercase; letter-spacing: 0.05em; }
        input { 
            background: #1e293b; color: #f8fafc; border: 1px solid #475569; 
            padding: 10px 12px; border-radius: 8px; margin-bottom: 8px; width: 100%; 
            box-sizing: border-box; font-family: 'Inter', sans-serif; font-size: 0.875rem;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        input:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2); }
        button { 
            background: #3b82f6; color: white; border: none; padding: 10px 12px; 
            border-radius: 8px; width: 100%; font-weight: 500; font-size: 0.875rem;
            cursor: pointer; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); 
            box-shadow: 0 4px 6px -1px rgba(59, 130, 246, 0.3);
        }
        button:hover { background: #2563eb; transform: translateY(-1px); box-shadow: 0 6px 8px -1px rgba(59, 130, 246, 0.4); }
        button:active { transform: translateY(0); box-shadow: 0 2px 4px -1px rgba(59, 130, 246, 0.3); }
        
        #error-toast {
            position: absolute; bottom: 24px; right: 24px; z-index: 20;
            background: #ef4444; color: white; padding: 12px 20px;
            border-radius: 8px; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            font-size: 0.875rem; font-weight: 500; display: none;
            animation: slideUp 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        @keyframes slideUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body>
    <div id="controls">
        <h1>StuDAG Core</h1>
        <p class="subtitle">SSoT Architecture • Diff Sync</p>
        
        <div class="control-group">
            <h2>Graph Nodes</h2>
            <input type="text" id="nodeId" placeholder="ID (e.g. n1)">
            <input type="text" id="nodeLabel" placeholder="Label Text">
            <button onclick="addNode()">Dispatch Mutation</button>
        </div>
        
        <div class="control-group">
            <h2>Directed Edges</h2>
            <input type="text" id="edgeId" placeholder="Edge ID (e.g. e1)">
            <input type="text" id="edgeFrom" placeholder="Source Node ID">
            <input type="text" id="edgeTo" placeholder="Target Node ID">
            <button onclick="addEdge()">Dispatch Mutation</button>
        </div>
    </div>
    
    <div id="error-toast"></div>
    <div id="network"></div>
    
    <script src="app.js"></script>
    <script>
        function addNode() {
            const id = document.getElementById('nodeId').value;
            const label = document.getElementById('nodeLabel').value;
            if (id) {
                requestAddNode(id, label || id);
                document.getElementById('nodeId').value = '';
                document.getElementById('nodeLabel').value = '';
            }
        }
        function addEdge() {
            const id = document.getElementById('edgeId').value;
            const from = document.getElementById('edgeFrom').value;
            const to = document.getElementById('edgeTo').value;
            if (id && from && to) {
                requestAddEdge(id, from, to);
                document.getElementById('edgeId').value = '';
            }
        }
        
        function showError(msg) {
            const toast = document.getElementById('error-toast');
            toast.textContent = msg;
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 4000);
        }
    </script>
</body>
</html>

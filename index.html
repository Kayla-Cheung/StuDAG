<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StuDAG - Cognitive Dashboard</title>
    <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0f19;
            --panel-bg: rgba(15, 23, 42, 0.7);
            --border-color: rgba(51, 65, 85, 0.5);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #38bdf8;
            --node-focus: #ef4444;
            --node-pending: #f59e0b;
            --node-resolved: #10b981;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at 50% 0%, #1e293b 0%, transparent 50%);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        header {
            padding: 20px 30px;
            background: var(--panel-bg);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }
        .title-block h1 {
            font-weight: 800;
            margin: 0;
            font-size: 1.5rem;
            color: var(--text-main);
            letter-spacing: -0.5px;
        }
        .title-block span {
            color: var(--accent);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-left: 10px;
            padding: 2px 6px;
            background: rgba(56, 189, 248, 0.1);
            border-radius: 4px;
        }
        .title-block p {
            margin: 5px 0 0 0;
            font-size: 0.9rem;
            color: var(--text-muted);
        }
        .legend {
            display: flex;
            gap: 20px;
            background: rgba(0,0,0,0.3);
            padding: 10px 20px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }
        .legend-item {
            display: flex;
            align-items: center;
            font-size: 0.85rem;
            font-weight: 600;
        }
        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 8px;
            box-shadow: 0 0 8px currentColor;
        }
        #mynetwork {
            flex-grow: 1;
            width: 100%;
            outline: none;
        }
        #toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--panel-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-color);
            padding: 12px 24px;
            border-radius: 8px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 100;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        #toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }
        #toast.error { border-color: var(--node-focus); color: #fca5a5; }
        #toast.success { border-color: var(--node-resolved); color: #6ee7b7; }
    </style>
</head>
<body>
    <header>
        <div class="title-block">
            <h1>StuDAG <span>Live</span></h1>
            <p>Physical Cognitive Call Stack Tracker | Double-click to POP</p>
        </div>
        <div class="legend">
            <div class="legend-item"><div class="dot" style="color: var(--node-focus); background: var(--node-focus);"></div>Top Focus</div>
            <div class="legend-item"><div class="dot" style="color: var(--node-pending); background: var(--node-pending);"></div>Pending</div>
            <div class="legend-item"><div class="dot" style="color: var(--node-resolved); background: var(--node-resolved);"></div>Resolved</div>
        </div>
    </header>
    
    <div id="mynetwork"></div>
    <div id="toast"></div>

    <script>
        var network = null;
        var lastStateStr = "";
        
        function showToast(msg, isError=false) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.className = isError ? 'show error' : 'show success';
            setTimeout(() => { toast.className = toast.className.replace('show', ''); }, 3000);
        }

        async function fetchState() {
            try {
                const response = await fetch('/api/state');
                const state = await response.json();
                const stateStr = JSON.stringify(state);
                
                if (stateStr !== lastStateStr) {
                    drawGraph(state);
                    lastStateStr = stateStr;
                }
            } catch (err) {
                // Silent catch for dev server restarts
            }
        }

        async function resolveNode(nodeId) {
            try {
                const res = await fetch('/api/resolve', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({node_id: nodeId})
                });
                const data = await res.json();
                if (data.status === 'error') {
                    showToast("⚠️ PermissionError: " + data.detail, true);
                } else {
                    showToast("✅ POP: Node " + nodeId + " resolved.", false);
                    fetchState(); 
                }
            } catch(e) {
                console.error(e);
            }
        }

        function drawGraph(state) {
            var nodes_data = [];
            var edges_data = [];
            
            state.nodes.forEach(node => {
                let color = node.status === 'resolved' ? 'var(--node-resolved)' : 'var(--node-pending)';
                let isTop = state.call_stack.length > 0 && state.call_stack[state.call_stack.length - 1] === node.id;
                
                if (isTop) color = 'var(--node-focus)';

                nodes_data.push({
                    id: node.id,
                    label: `[ ${node.topic} ]`,
                    shape: 'box',
                    color: { 
                        background: 'rgba(15, 23, 42, 0.9)', 
                        border: color, 
                        highlight: { background: 'rgba(30, 41, 59, 1)', border: color } 
                    },
                    font: { color: color, face: 'JetBrains Mono', size: 14, bold: isTop },
                    borderWidth: isTop ? 3 : 1,
                    shadow: isTop ? { enabled: true, color: color, size: 15, x: 0, y: 0 } : false,
                    margin: 12
                });

                if (node.parent_id) {
                    edges_data.push({
                        from: node.parent_id,
                        to: node.id,
                        arrows: 'to',
                        color: { color: 'rgba(148, 163, 184, 0.4)', highlight: color },
                        width: isTop ? 2 : 1,
                        smooth: { type: 'cubicBezier', forceDirection: 'vertical', roundness: 0.4 }
                    });
                }
            });

            var container = document.getElementById('mynetwork');
            var data = {
                nodes: new vis.DataSet(nodes_data),
                edges: new vis.DataSet(edges_data)
            };
            var options = {
                layout: {
                    hierarchical: {
                        direction: 'UD',
                        sortMethod: 'directed',
                        nodeSpacing: 250,
                        levelSeparation: 150
                    }
                },
                physics: {
                    enabled: true,
                    hierarchicalRepulsion: {
                        centralGravity: 0.0,
                        springLength: 100,
                        springConstant: 0.01,
                        nodeDistance: 200,
                        damping: 0.09
                    },
                    solver: 'hierarchicalRepulsion'
                },
                interaction: { hover: true, tooltipDelay: 200 }
            };

            if (network === null) {
                network = new vis.Network(container, data, options);
                network.on("doubleClick", function (params) {
                    if (params.nodes.length > 0) {
                        var nodeId = params.nodes[0];
                        resolveNode(nodeId);
                    }
                });
                network.on("hoverNode", function() { document.body.style.cursor = "pointer"; });
                network.on("blurNode", function() { document.body.style.cursor = "default"; });
            } else {
                network.setData(data);
            }
        }

        setInterval(fetchState, 1000);
        fetchState();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StuDAG - Cognitive Dashboard</title>
    <script type="text/javascript" src="https://cdnjs.cloudflare.com/ajax/libs/vis-network/9.1.2/standalone/umd/vis-network.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #060913;
            --panel-bg: rgba(13, 17, 30, 0.5);
            --panel-border: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --text-muted: #8b9bb4;
            --accent: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.5);
            
            /* Node Colors */
            --node-focus: #ef4444;       /* Red */
            --node-focus-glow: rgba(239, 68, 68, 0.6);
            --node-pending: #f59e0b;     /* Amber */
            --node-pending-glow: rgba(245, 158, 11, 0.4);
            --node-resolved: #10b981;    /* Emerald */
            --node-resolved-glow: rgba(16, 185, 129, 0.4);
        }
        
        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* Abstract Aurora Background */
        .bg-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            z-index: -1;
            opacity: 0.4;
            animation: float 20s infinite ease-in-out alternate;
        }
        .orb-1 {
            width: 600px;
            height: 600px;
            background: #1e3a8a; /* Deep blue */
            top: -100px;
            left: -100px;
        }
        .orb-2 {
            width: 500px;
            height: 500px;
            background: #4c1d95; /* Deep purple */
            bottom: -100px;
            right: 10%;
            animation-delay: -5s;
        }
        .grid-bg {
            position: absolute;
            inset: 0;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: -1;
            mask-image: radial-gradient(circle at center, black 40%, transparent 100%);
            -webkit-mask-image: radial-gradient(circle at center, black 40%, transparent 100%);
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(50px, 30px) scale(1.1); }
            100% { transform: translate(-30px, -50px) scale(0.9); }
        }

        header {
            padding: 24px 40px;
            background: var(--panel-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--panel-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }

        .title-block {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .title-block h1 {
            font-weight: 800;
            margin: 0;
            font-size: 1.75rem;
            color: var(--text-main);
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
        }

        .title-block span {
            color: var(--accent);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-left: 12px;
            padding: 4px 8px;
            background: rgba(59, 130, 246, 0.15);
            border: 1px solid rgba(59, 130, 246, 0.3);
            border-radius: 6px;
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.2);
        }

        .title-block p {
            margin: 0;
            font-size: 0.95rem;
            color: var(--text-muted);
            font-weight: 300;
        }

        .legend {
            display: flex;
            gap: 24px;
            background: rgba(0,0,0,0.4);
            padding: 12px 24px;
            border-radius: 12px;
            border: 1px solid var(--panel-border);
            backdrop-filter: blur(10px);
        }

        .legend-item {
            display: flex;
            align-items: center;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
        }

        .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 10px;
        }

        .dot.focus { background: var(--node-focus); box-shadow: 0 0 12px var(--node-focus-glow); }
        .dot.pending { background: var(--node-pending); box-shadow: 0 0 12px var(--node-pending-glow); }
        .dot.resolved { background: var(--node-resolved); box-shadow: 0 0 12px var(--node-resolved-glow); }

        #mynetwork {
            flex-grow: 1;
            width: 100%;
            height: calc(100vh - 100px); /* Fill remaining space */
            outline: none;
            position: relative;
            z-index: 1;
        }

        /* Loading Overlay */
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'JetBrains Mono', monospace;
            color: var(--accent);
            font-size: 1rem;
            letter-spacing: 2px;
            z-index: 5;
            transition: opacity 0.5s;
        }

        /* Modern Toast */
        #toast {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%) translateY(120px) scale(0.9);
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--panel-border);
            padding: 14px 28px;
            border-radius: 50px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.95rem;
            font-weight: 600;
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 100;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        #toast.show {
            transform: translateX(-50%) translateY(0) scale(1);
            opacity: 1;
        }

        #toast.error { 
            border-color: rgba(239, 68, 68, 0.3); 
            color: #fca5a5; 
            box-shadow: 0 20px 40px rgba(239, 68, 68, 0.15);
        }
        
        #toast.success { 
            border-color: rgba(16, 185, 129, 0.3); 
            color: #6ee7b7; 
            box-shadow: 0 20px 40px rgba(16, 185, 129, 0.15);
        }
    </style>
</head>
<body>
    <!-- Abstract Background -->
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>
    <div class="grid-bg"></div>

    <header>
        <div class="title-block">
            <h1>StuDAG <span>Live Engine</span></h1>
            <p>Topological Extraction Shooter • Double-click node to POP (Evacuate)</p>
        </div>
        <div class="legend">
            <div class="legend-item"><div class="dot focus"></div>Active Target</div>
            <div class="legend-item"><div class="dot pending"></div>Pending</div>
            <div class="legend-item"><div class="dot resolved"></div>Extracted</div>
        </div>
    </header>
    
    <div id="loading">Initializing Neural Link...</div>
    <div id="mynetwork"></div>
    <div id="toast"></div>

    <script>
        var network = null;
        var nodesDataset = new vis.DataSet();
        var edgesDataset = new vis.DataSet();
        var lastStateStr = "";
        var initialLoad = true;
        
        function showToast(msg, isError=false) {
            const toast = document.getElementById('toast');
            toast.innerHTML = (isError ? '⚠️ ' : '⚡ ') + msg;
            toast.className = isError ? 'show error' : 'show success';
            setTimeout(() => { toast.className = toast.className.replace('show', ''); }, 3000);
        }

        async function fetchState() {
            try {
                const response = await fetch('/api/state?t=' + new Date().getTime());
                const state = await response.json();
                const stateStr = JSON.stringify(state);
                
                if (stateStr !== lastStateStr) {
                    if (initialLoad) {
                        document.getElementById('loading').style.opacity = '0';
                        setTimeout(() => document.getElementById('loading').style.display = 'none', 500);
                        initialLoad = false;
                    }
                    drawGraph(state);
                    lastStateStr = stateStr;
                }
            } catch (err) {
                console.error(err);
            }
        }

        async function resolveNode(nodeId) {
            try {
                const res = await fetch('/api/resolve', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({node_id: nodeId})
                });
                const data = await res.json();
                if (data.status === 'error') {
                    showToast("Access Denied: " + data.detail, true);
                } else {
                    showToast("Extraction Successful: " + nodeId, false);
                    fetchState(); 
                }
            } catch(e) {
                console.error(e);
            }
        }

        function drawGraph(state) {
            var new_nodes = [];
            var new_edges = [];
            
            state.nodes.forEach(node => {
                let isTop = state.call_stack.length > 0 && state.call_stack[state.call_stack.length - 1] === node.id;
                
                // Color mapping
                let borderColor, bgColor, fontColor, shadowColor;
                
                if (isTop) {
                    borderColor = '#ef4444';
                    bgColor = 'rgba(239, 68, 68, 0.1)';
                    fontColor = '#fca5a5';
                    shadowColor = 'rgba(239, 68, 68, 0.6)';
                } else if (node.status === 'resolved') {
                    borderColor = '#10b981';
                    bgColor = 'rgba(16, 185, 129, 0.05)';
                    fontColor = '#6ee7b7';
                    shadowColor = 'rgba(16, 185, 129, 0.2)';
                } else {
                    borderColor = '#f59e0b';
                    bgColor = 'rgba(245, 158, 11, 0.05)';
                    fontColor = '#fcd34d';
                    shadowColor = 'rgba(245, 158, 11, 0.2)';
                }

                new_nodes.push({
                    id: node.id,
                    label: node.topic,
                    shape: 'box',
                    shapeProperties: { borderRadius: 8 },
                    color: { 
                        background: bgColor, 
                        border: borderColor, 
                        highlight: { background: bgColor, border: '#ffffff' } 
                    },
                    font: { color: fontColor, face: 'JetBrains Mono', size: isTop ? 16 : 14, bold: isTop },
                    borderWidth: isTop ? 2 : 1.5,
                    shadow: { enabled: true, color: shadowColor, size: isTop ? 20 : 10, x: 0, y: 0 },
                    margin: { top: 12, bottom: 12, left: 16, right: 16 }
                });

                if (node.parent_id) {
                    new_edges.push({
                        id: `${node.parent_id}-${node.id}`,
                        from: node.parent_id,
                        to: node.id,
                        arrows: { to: { enabled: true, scaleFactor: 0.6, type: 'arrow' } },
                        color: { color: borderColor, opacity: 0.5, highlight: '#ffffff' },
                        width: isTop ? 2.5 : 1.5,
                        smooth: { type: 'cubicBezier', forceDirection: 'vertical', roundness: 0.5 },
                        dashes: node.status === 'resolved' ? false : [5, 5] // Dashed for unresolved connections
                    });
                }
            });

            var new_node_ids = new_nodes.map(n => n.id);
            var new_edge_ids = new_edges.map(e => e.id);

            var nodesToRemove = nodesDataset.getIds().filter(id => !new_node_ids.includes(id));
            var edgesToRemove = edgesDataset.getIds().filter(id => !new_edge_ids.includes(id));

            if (nodesToRemove.length > 0) nodesDataset.remove(nodesToRemove);
            if (edgesToRemove.length > 0) edgesDataset.remove(edgesToRemove);

            nodesDataset.update(new_nodes);
            edgesDataset.update(new_edges);

            if (network === null) {
                var container = document.getElementById('mynetwork');
                var data = {
                    nodes: nodesDataset,
                    edges: edgesDataset
                };
                var options = {
                    layout: {
                        hierarchical: {
                            direction: 'UD',
                            sortMethod: 'directed',
                            nodeSpacing: 400,
                            levelSeparation: 250
                        }
                    },
                    physics: {
                        enabled: true,
                        hierarchicalRepulsion: {
                            centralGravity: 0.0,
                            springLength: 150,
                            springConstant: 0.01,
                            nodeDistance: 350,
                            damping: 0.09
                        },
                        solver: 'hierarchicalRepulsion'
                    },
                    interaction: { hover: true, tooltipDelay: 200, zoomView: true }
                };
                network = new vis.Network(container, data, options);
                
                network.on("stabilizationIterationsDone", function () {
                    network.fit({ animation: { duration: 1000, easingFunction: 'easeInOutQuad' } });
                });

                network.on("doubleClick", function (params) {
                    if (params.nodes.length > 0) {
                        var nodeId = params.nodes[0];
                        resolveNode(nodeId);
                    }
                });
                network.on("hoverNode", function() { document.body.style.cursor = "pointer"; });
                network.on("blurNode", function() { document.body.style.cursor = "default"; });
            }
        }

        setInterval(fetchState, 1000);
        fetchState();
    </script>
</body>
</html>
